name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-macos-arm64:
    name: Build and Test (macOS arm64 / iOS simulator arm64 / Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test Apple targets
        run: >
          ./gradlew
          compileKotlinIosArm64
          compileKotlinIosSimulatorArm64
          compileKotlinMacosArm64
          iosSimulatorArm64Test
          macosArm64Test
          assembleBTreeKotlinXCFramework
          --no-configuration-cache

  build-ios-x64:
    name: Build and Test (iOS simulator x64)
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test Intel iOS simulator target
        run: >
          ./gradlew
          compileKotlinIosX64
          iosX64Test
          --no-configuration-cache

  build-linux:
    name: Build and Test (Linux / Android / JS / WASM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.17 --activate

      - name: Build and test Linux, Android, JS, and WASM targets
        env:
          ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"
        run: >
          ./gradlew
          compileAndroidMain
          assembleAndroidHostTest
          testAndroidHostTest
          assembleAndroidDeviceTest
          jsBrowserTest
          jsNodeTest
          linuxX64Test
          wasmJsBrowserTest
          wasmJsNodeTest
          --no-configuration-cache

  build-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test Windows target
        run: ./gradlew mingwX64Test --no-configuration-cache
